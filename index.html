<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>nuanu Experience — A clinical longevity programme in Bali</title>
  <meta name="description" content="A 14-day clinical longevity retreat at Nuanu Creative City, Bali. Application only. Cohort of ten." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Brand tokens → Tailwind theme.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:    "#1D2B29",
            green:  "#1E5246",
            warm:   "#F4EFE7",
            sun1:   "#A54305",
            sun2:   "#DA8F0B",
            sun3:   "#E7B610",
          },
          fontFamily: {
            display: ["Spectral", "Times New Roman", "serif"],
            body:    ["-apple-system","BlinkMacSystemFont","'Helvetica Neue'","Helvetica","Arial","sans-serif"],
            mono:    ["'JetBrains Mono'","ui-monospace","SFMono-Regular","Menlo","Consolas","monospace"],
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --ink: #1D2B29;
      --green: #1E5246;
      --warm: #F4EFE7;
      --sun-1: #A54305;
      --sun-2: #DA8F0B;
      --sun-3: #E7B610;

      --font-display: "Spectral", "Times New Roman", serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    .font-display { font-family: var(--font-display); font-weight: 400; }
    .font-body    { font-family: var(--font-body); }
    .font-mono    { font-family: var(--font-mono); }

    /* Vessel card — rounded vessel surface per brand graphic system. */
    .vessel-card {
      background: #fff;
      border-radius: 32px;
      padding: 36px;
      border: 1px solid rgba(29, 43, 41, 0.08);
      transition: border-color 200ms ease-out;
    }
    .vessel-card:hover { border-color: rgba(29, 43, 41, 0.18); }

    /* CTAs — invert on hover per brief (Nuanu Green → Warm Neutral fill). */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 28px;
      background: var(--green);
      color: var(--warm);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-radius: 999px;
      border: 1px solid var(--green);
      transition: background-color 200ms ease-out, color 200ms ease-out;
      cursor: pointer;
    }
    .btn-primary:hover, .btn-primary:focus {
      background: var(--warm);
      color: var(--green);
      outline: none;
    }
    .btn-primary-on-dark {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 28px;
      background: #fff;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-radius: 999px;
      border: 1px solid #fff;
      transition: background-color 200ms ease-out, color 200ms ease-out;
    }
    .btn-primary-on-dark:hover {
      background: transparent;
      color: #fff;
    }
    .btn-ghost-on-dark {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 0;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.4);
      transition: border-color 200ms ease-out, color 200ms ease-out;
    }
    .btn-ghost-on-dark:hover {
      border-color: #fff;
    }

    .cta-link {
      transition: opacity 200ms ease-out;
    }
    .cta-link:hover { opacity: 0.7; }

    /* Selection */
    ::selection { background: var(--green); color: var(--warm); }

    /* Inputs */
    input, textarea, select, button { font-family: inherit; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <script src="variants.js"></script>
</head>
<body>
  <div id="root"></div>
  <script src="bundle.js"></script>
</body>
</html>
